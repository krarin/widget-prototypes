<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Validation – Prototypen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/styles.css" />

  <style>
    html, body {
      height: 100%;
      overflow: auto;
    }

    body {
      background: var(--color-neutral-light-100);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .launch-wrap {
      width: 100%;
      max-width: 720px;
      padding: var(--space-xl) var(--space-l);
    }

    .launch-eyebrow {
      font-family: var(--font-family);
      font-size: var(--h5-size);
      font-weight: var(--h5-weight);
      letter-spacing: var(--h5-spacing);
      text-transform: uppercase;
      color: var(--color-neutral-dark-300);
      margin-bottom: var(--space-s);
    }

    .launch-heading {
      font-family: var(--font-family);
      font-size: var(--h1-size);
      font-weight: var(--h1-weight);
      color: var(--color-neutral-dark-900);
      margin-bottom: var(--space-xl);
    }

    .launch-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-l);
    }

    .launch-card {
      background: var(--color-neutral-light-000);
      border: 1px solid var(--color-neutral-light-500);
      border-radius: 4px;
      padding: var(--space-l);
      display: flex;
      flex-direction: column;
      gap: var(--space-s);
    }

    .launch-card-tag {
      font-family: var(--font-family);
      font-size: var(--h5-size);
      font-weight: var(--h5-weight);
      letter-spacing: var(--h5-spacing);
      text-transform: uppercase;
      color: var(--color-neutral-dark-300);
    }

    .launch-card-title {
      font-family: var(--font-family);
      font-size: var(--h3-size);
      font-weight: var(--h3-weight);
      line-height: var(--h3-line-height);
      color: var(--color-neutral-dark-900);
      margin-top: var(--space-xs);
    }

    .launch-card-desc {
      font-family: var(--font-family);
      font-size: var(--body-regular-size);
      line-height: var(--body-regular-line-height);
      color: var(--color-neutral-dark-400);
      flex: 1;
      margin-bottom: var(--space-s);
    }

    .launch-card-link {
      display: inline-flex;
      align-items: center;
      padding: 6px var(--space-m);
      background: var(--color-primary-500);
      color: var(--color-neutral-light-000);
      border-radius: 4px;
      font-family: var(--font-family);
      font-size: var(--body-regular-size);
      font-weight: var(--font-weight-medium);
      text-decoration: none;
      align-self: flex-start;
      transition: background 0.15s ease;
    }

    .launch-card-link:hover {
      background: var(--color-primary-600);
      text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="launch-wrap">
    <p class="launch-eyebrow">Datenvalidierung</p>
    <h1 class="launch-heading">Prototypen</h1>

    <div class="launch-cards">

      <div class="launch-card">
        <span class="launch-card-tag">Prototype 1a</span>
        <span class="launch-card-title">Tabellenansicht mit Drawer</span>
        <p class="launch-card-desc">Validierung als strukturierte Tabelle mit Filterung und Detaildrawer.</p>
        <a href="prototype1.html" class="launch-card-link">Öffnen</a>
      </div>

      <div class="launch-card">
        <span class="launch-card-tag">Prototype 2</span>
        <span class="launch-card-title">Floating Widget</span>
        <p class="launch-card-desc">Validierung als schwebendes Widget mit direkter Inline-Bearbeitung.</p>
        <a href="prototype2.html" class="launch-card-link">Öffnen</a>
      </div>

    </div>
  </div>

</body>
</html>
